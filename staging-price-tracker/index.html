<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to grocery price tracker…</title>
  <link rel="canonical" href="https://scrollingtheaisle.com/grocery-price-tracker/" />
  <meta http-equiv="refresh" content="0;url=/grocery-price-tracker/" />
  <script>
    (function () {
      var target = "/grocery-price-tracker/" + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>This page moved to <a id="redirect-link" href="/grocery-price-tracker/">/grocery-price-tracker/</a>.</p>
  <script>
    document.getElementById("redirect-link").href =
      "/grocery-price-tracker/" + window.location.search + window.location.hash;
  </script>
</body>
</html>
