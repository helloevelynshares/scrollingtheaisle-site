schema_version: 2
last_updated: '2026-07-05'
purpose: Human-editable canonical tracker-family reference for Scrolling the Aisle price graphs. Families mirror weekly-ad
  sale groupings, while keeping user-facing headlines simple and putting size/format details in subtitles.
usage_notes:
- Use canonical_tracker_family as the user-facing headline.
- Use size_format_subtitle as the user-facing subtitle.
- Use include and keep_separate_from only as matching guidance for weekly-ad extraction and graph assignment.
- Normalize pack/count differences when notes say to do so, such as strawberries 1–2 lb, eggs per dozen, Chobani per cup,
  butter per 16 oz, and cheese 6–8 oz.
- 'Promo groups are separate from tracker families: multiple tracker families can share the same weekly promo mechanic but
  still feed separate price graphs.'
- Prefer size_format_subtitle as `regular size, <range>` or `family size, <range>` when the
  family is a standard-vs-larger pack (party/giant map to family size). Avoid filler like
  “bags”, “boxes”, or “roughly”. Skip the prefix for formats that are not that split
  (per lb, packs, tubs, each, etc.).
- display_order is the recommended homepage order, roughly prioritized by stock-up popularity, weekly-ad recurrence, and TikTok/video
  relevance.
