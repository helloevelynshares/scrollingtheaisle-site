<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scrolling the Aisle</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #fafafa;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 18px;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      color: #999;
      margin-bottom: 20px;
    }

    .beehiiv-form-wrapper {
      max-width: 520px;
      margin: 0 auto;
    }

    footer {
      margin-top: 80px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">SCROLLING THE AISLE</div>

    <h1>Find the best grocery deals, fast</h1>

    <p>
      We track the best weekly deals across stores so you don’t have to.
      Be the first to know when new deals drop.
    </p>

    <div class="beehiiv-form-wrapper">
      <script
        async
        src="https://subscribe-forms.beehiiv.com/v3/loader.js"
        data-beehiiv-form="55ee22f3-880a-4a81-b96e-56f2be101b07">
      </script>
    </div>

    <footer>
      Built for deal hunters 🛒
    </footer>
  </div>
</body>
</html>
